<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>חוגגים 40 - אבא ואמא</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark-bg: #0a0e17; }
        body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Assistant', sans-serif; background: radial-gradient(circle at center, #1a2a6c 0%, #0a0e17 100%); color: white; overflow-x: hidden; text-align: center; }
        .score-board { display: flex; justify-content: space-around; width: 100%; max-width: 900px; font-size: 2rem; font-weight: 800; margin: 20px auto; align-items: center; color: var(--gold); }
        .logo-container { width: 120px; height: 120px; border: 3px solid var(--gold); border-radius: 50%; overflow: hidden; box-shadow: 0 0 20px var(--gold); background: #000; }
        .logo-main { width: 100%; height: 100%; object-fit: cover; }
        .question-card { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(10px); padding: 30px; border-radius: 25px; border: 1px solid rgba(212, 175, 55, 0.3); width: 90%; max-width: 800px; margin: 20px auto; box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative; min-height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #question-text { font-size: 2.5rem; margin-bottom: 20px; font-weight: 800; width: 100%; }
        .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .answer-opt { padding: 20px; background: white; color: #1a2a6c; border-radius: 15px; font-size: 1.5rem; cursor: pointer; font-weight: 700; transition: 0.2s; border: none; width: 100%; }
        .answer-opt:active { transform: scale(0.95); }
        .disabled { pointer-events: none; opacity: 0.5; }
        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 1000; }
        .admin-btn { padding: 15px 25px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: black; font-size: 1.1rem; }
        #start-btn-large { padding: 25px 50px; font-size: 2.2rem; background: var(--gold); border: none; border-radius: 50px; color: black; font-weight: 800; cursor: pointer; box-shadow: 0 0 40px var(--gold); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .timer-ui { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--gold); margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="score-board">
    <div>אמא: <span id="score-mother">0</span></div>
    <div class="logo-container"><img src="logo.jpeg" class="logo-main"></div>
    <div>אבא: <span id="score-father">0</span></div>
</div>

<div class="question-card" id="q-card">
    <h1 id="question-text">מוכנים למשחק?</h1>
    <div id="setup-area">
        <button id="start-btn-large" onclick="startGameLocally()">התחל משחק!</button>
    </div>
    <div id="game-area" style="display:none; width: 100%;">
        <div class="timer-ui" id="timer-text">15</div>
        <div class="answer-grid" id="answer-grid"></div>
    </div>
</div>

<div class="controls" id="admin-controls">
    <button class="admin-btn" onclick="resetGameToWaiting()">איפוס משחק ↺</button>
    <button class="admin-btn" id="next-btn" onclick="nextQuestion()" style="display:none;">שאלה הבאה ➔</button>
</div>

<div id="final-screen" style="display:none;">
    <h1 id="winner-display" style="font-size: 4rem; color: var(--gold); text-shadow: 0 0 20px var(--gold); margin-top: 50px;"></h1>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyC6FPJBGHqI9PgloMiqb3dxegczLDwtLnM",
        authDomain: "anniversarygame-31761.firebaseapp.com",
        projectId: "anniversarygame-31761",
        databaseURL: "https://anniversarygame-31761-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const playerType = urlParams.get('p');
    const sndTension = new Audio('muzik.mp3'); 
    const sndCorrect = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');

    const questions = [
        { q: "בן כמה חיים?", opts: ["35", "34", "37", "40"], correct: 2 },
        { q: "בן כמה מענדי?", opts: ["35", "34", "37", "40"], correct: 1 },
        { q: "בת כמה גולדי?", opts: ["35", "34", "37", "40"], correct: 0 }
    ];

    let currentQ = 0, scores = { father: 0, mother: 0 }, timerInterval;

    db.ref('game/state').on('value', snap => {
        const state = snap.val();
        if(!state) return;
        scores = state.scores || { father: 0, mother: 0 };
        document.getElementById('score-father').innerText = Math.round(scores.father);
        document.getElementById('score-mother').innerText = Math.round(scores.mother);
        if(state.status === 'playing') {
            currentQ = state.currentQ;
            renderQuestionUI();
        } else if(state.status === 'finished') {
            showWinnerUI();
        } else if(state.status === 'waiting') {
            resetUIToWaiting();
        }
    });

    function startGameLocally() {
        sndTension.loop = true;
        sndTension.play();
        db.ref('game/state').set({ status: 'playing', currentQ: 0, scores: { father: 0, mother: 0 } });
    }

    function renderQuestionUI() {
        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        document.getElementById('final-screen').style.display = 'none';
        document.getElementById('q-card').style.display = 'flex';
        if(!playerType) document.getElementById('next-btn').style.display = 'block';
        const q = questions[currentQ];
        document.getElementById('question-text').innerText = q.q;
        const grid = document.getElementById('answer-grid');
        grid.innerHTML = '';
        q.opts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'answer-opt';
            btn.innerText = opt;
            btn.onclick = () => handleAnswerLocally(i);
            grid.appendChild(btn);
        });
        startTimerUI();
    }

    function startTimerUI() {
        let time = 15;
        document.getElementById('timer-text').innerText = time;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            time--;
            document.getElementById('timer-text').innerText = time;
            if(time <= 0) clearInterval(timerInterval);
        }, 1000);
    }

    function handleAnswerLocally(idx) {
        if(!playerType) return; 
        const isCorrect = idx === questions[currentQ].correct;
        if(isCorrect) {
            scores[playerType] += 10;
            sndCorrect.play();
            db.ref('game/state/scores').set(scores);
        }
        document.querySelectorAll('.answer-opt').forEach(b => b.classList.add('disabled'));
    }

    function nextQuestion() {
        if(currentQ < questions.length - 1) {
            db.ref('game/state/currentQ').set(currentQ + 1);
        } else {
            db.ref('game/state/status').set('finished');
        }
    }

    function resetGameToWaiting() {
        sndTension.pause();
        sndTension.currentTime = 0;
        db.ref('game/state').set({ status: 'waiting' });
    }

    function resetUIToWaiting() {
        document.getElementById('setup-area').style.display = 'block';
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('final-screen').style.display = 'none';
        document.getElementById('q-card').style.display = 'flex';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('question-text').innerText = "מוכנים למשחק?";
        clearInterval(timerInterval);
    }

    function showWinnerUI() {
        document.getElementById('q-card').style.display = 'none';
        document.getElementById('final-screen').style.display = 'block';
        const winTxt = scores.father > scores.mother ? "אבא ניצח!" : (scores.mother > scores.father ? "אמא ניצחה!" : "תיקו!");
        document.getElementById('winner-display').innerText = winTxt;
        confetti({ particleCount: 300, spread: 100 });
    }

    if(playerType) {
        document.getElementById('admin-controls').style.display = 'none';
        document.getElementById('setup-area').innerHTML = "<h2 style='color:var(--gold)'>ממתינים למנהל...</h2>";
    }
</script>
</body>
</html>
